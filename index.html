  <style>
  body {
      background-color: #000;
      color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      line-height: 1.5;
      text-align: center;
  }
  h1, h2, h3, h4 {
      color: #fff;
      margin: 10px 0;
      font-weight: 700;
      letter-spacing: -0.02em;
  }
  h1 { font-size: 2.5rem; }
  h2 { font-size: 1.8rem; }
  h3 { font-size: 1.2rem; color: #888; }
  p { color: #aaa; }
  button {
      background-color: #111;
      color: #fff;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px 24px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 5px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      outline: none;
  }
  button:hover {
      background-color: #fff;
      color: #000;
      border-color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
  }
  button:active { transform: translateY(0); }
  hr {
      border: 0;
      border-top: 1px solid #222;
      margin: 30px auto;
      width: 100%;
  }
  .nav-container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 30px;
  }
  .discord-btn {
      max-width: 800px;
      margin: 20px auto;
      font-size: 1.2rem;
      background-color: #5865F2;
      border: none;
      width: 100%;
  }
  .discord-btn:hover { background-color: #4752c4; color: #fff; }
  img {
      max-width: 100%;
      height: auto;
      border-radius: 12px;
      margin: 20px 0;
  }
  </style>
</head>

  <div class="nav-container">
